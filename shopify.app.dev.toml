# shopify.app.toml (PRODUCTION)
# deploy: shopify app deploy --config dev

client_id = "697313e4bf2304b130ef336d8b97b04e"
name = "GG Pickleball (Dev)"
application_url = "https://gg-pickleball-production-9f94.up.railway.app"
embedded = false

[webhooks]
api_version = "2026-04"

# Compliance webhooks
[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request"]
uri = "/api/webhooks/shopify/compliance"

[[webhooks.subscriptions]]
compliance_topics = ["customers/redact"]
uri = "/api/webhooks/shopify/compliance"

[[webhooks.subscriptions]]
compliance_topics = ["shop/redact"]
uri = "/api/webhooks/shopify/compliance"

# Orders webhook with filter
[[webhooks.subscriptions]]
topics = ["orders/paid"]
uri = "/api/webhooks/shopify/order"
filter = "discount_codes.code:GG*"

[access_scopes]
scopes = "read_discounts,write_discounts,read_orders"
optional_scopes = []

use_legacy_install_flow = false

[auth]
redirect_urls = ["https://gg-pickleball-production-9f94.up.railway.app/api/shopify/callback"]