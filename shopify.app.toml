# shopify.app.toml (PRODUCTION)
# deploy: shopify app deploy

client_id = "697313e4bf2304b130ef336d8b97b04e"
name = "GG Pickleball"
application_url = "https://ggpickleball.co/api/shopify/install"
embedded = false

[webhooks]
api_version = "2026-04"

# Compliance webhooks
[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request"]
uri = "https://ggpickleball.co/api/webhooks/shopify/compliance"

[[webhooks.subscriptions]]
compliance_topics = ["customers/redact"]
uri = "https://ggpickleball.co/api/webhooks/shopify/compliance"

[[webhooks.subscriptions]]
compliance_topics = ["shop/redact"]
uri = "https://ggpickleball.co/api/webhooks/shopify/compliance"

# Orders webhook with filter
[[webhooks.subscriptions]]
topics = ["orders/paid"]
uri = "https://ggpickleball.co/api/webhooks/shopify/order"
filter = "discount_codes.code:GG*"

[access_scopes]
scopes = "read_discounts,write_discounts,read_orders"
optional_scopes = []

use_legacy_install_flow = false

[auth]
# Resolves to: https://ggpickleball.co/api/shopify/callback
redirect_urls = ["https://ggpickleball.co/api/shopify/callback"]